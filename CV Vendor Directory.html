<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f2f2f0;
    --card: #ffffff;
    --border: #e4e4e2;
    --label: #8a8a8a;
    --name: #111111;
    --company: #555555;
    --link: #0071e3;
    --note: #8a8a8a;
    --search-bg: #ffffff;
    --header-bg: #f2f2f0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--name);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--header-bg);
    padding: 12px 16px 10px;
    padding-top: calc(12px + env(safe-area-inset-top, 0px));
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--label);
    margin-bottom: 8px;
  }

  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--label);
  }

  input[type="search"] {
    width: 100%;
    padding: 10px 12px 10px 34px;
    font-size: 16px; /* prevents iOS zoom */
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--search-bg);
    color: var(--name);
    -webkit-appearance: none;
    appearance: none;
    outline: none;
  }
  input[type="search"]:focus { border-color: #aaa; }
  input[type="search"]::-webkit-search-cancel-button { -webkit-appearance: none; }

  /* ── CONTENT ── */
  .content {
    padding: 16px 12px;
    max-width: 560px;
    margin: 0 auto;
  }

  .section { margin-bottom: 28px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--label);
    padding: 0 4px;
    margin-bottom: 8px;
  }

  .cards { display: flex; flex-direction: column; gap: 1px; }

  .card {
    background: var(--card);
    padding: 13px 14px;
    border-radius: 0;
    position: relative;
  }
  .cards .card:first-child { border-radius: 10px 10px 0 0; }
  .cards .card:last-child  { border-radius: 0 0 10px 10px; }
  .cards .card:only-child  { border-radius: 10px; }
  .cards .card:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: 0; left: 14px; right: 0;
    height: 1px;
    background: var(--border);
  }

  .card-name    { font-size: 15px; font-weight: 600; color: var(--name); line-height: 1.2; }
  .card-company { font-size: 13px; color: var(--company); margin-top: 2px; }

  .card-contacts {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    margin-top: 8px;
  }

  .card-contacts a {
    font-size: 14px;
    color: var(--link);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
    min-height: 36px; /* comfortable tap target */
  }

  .card-notes {
    font-size: 12px;
    color: var(--note);
    margin-top: 5px;
    font-style: italic;
  }

  .no-results {
    text-align: center;
    color: var(--label);
    font-size: 14px;
    padding: 60px 0;
    display: none;
  }

  /* ── DESKTOP ── */
  @media (min-width: 768px) {
    .header {
      padding: 16px 24px 14px;
    }
    .header h1 { font-size: 12px; margin-bottom: 10px; }
    input[type="search"] { font-size: 14px; max-width: 400px; }

    .content {
      max-width: 1100px;
      padding: 24px 24px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0 24px;
      align-items: start;
    }

    .section { margin-bottom: 24px; }
    .card { padding: 11px 14px; }
    .card-name { font-size: 14px; }
    .card-company { font-size: 12px; }
    .card-contacts a { font-size: 13px; min-height: unset; padding: 2px 0; }
    .card-notes { font-size: 11px; }
  }

  @media (min-width: 1200px) {
    .content { grid-template-columns: repeat(3, 1fr); }
  }
</style>

function buildDirectory(filtered) {
  const dir = document.getElementById('directory');
  const noResults = document.getElementById('noResults');
  dir.innerHTML = '';

  const grouped = {};
  filtered.forEach(c => { if (!grouped[c.cat]) grouped[c.cat] = []; grouped[c.cat].push(c); });

  if (!Object.keys(grouped).length) { noResults.style.display = 'block'; return; }
  noResults.style.display = 'none';

  Object.entries(grouped).forEach(([cat, contacts]) => {
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<div class="section-label">${cat}</div>`;

    const cards = document.createElement('div');
    cards.className = 'cards';

    contacts.forEach(c => {
      const card = document.createElement('div');
      card.className = 'card';
      let html = `<div class="card-name">${c.name}</div>`;
      if (c.company) html += `<div class="card-company">${c.company}</div>`;
      const links = [];
      if (c.phone) links.push(`<a href="tel:${c.phone.replace(/\D/g,'')}" ontouchstart="">📞 ${c.phone}</a>`);
      if (c.email) links.push(`<a href="mailto:${c.email}" ontouchstart="">✉️ ${c.email}</a>`);
      if (links.length) html += `<div class="card-contacts">${links.join('')}</div>`;
      if (c.notes) html += `<div class="card-notes">${c.notes}</div>`;
      card.innerHTML = html;
      cards.appendChild(card);
    });

    section.appendChild(cards);
    dir.appendChild(section);
  });
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  buildDirectory(q ? data.filter(c =>
    [c.name, c.company, c.cat, c.notes].some(f => f.toLowerCase().includes(q))
  ) : data);
}

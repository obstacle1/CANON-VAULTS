<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Canon Vaults · Final Inspection Checklist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@400;500;600&display=swap');
:root {
  --bone:#f5f0e8;--parchment:#eae4d8;--warm:#d8d0c0;--mid:#7a7060;
  --ink:#1a1612;--gold:#b8944a;--gold-lt:#d4aa6a;--red:#8b3a2a;
  --green:#2a5c3f;--blue:#1e3a5f;--white:#ffffff;--border:rgba(0,0,0,0.08);--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bone);color:var(--ink);font-size:14px;line-height:1.5;min-height:100vh;}

header{background:var(--ink);padding:18px 20px 16px;border-bottom:2px solid var(--gold);}
.header-inner{max-width:860px;margin:0 auto;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--bone);letter-spacing:0.12em;text-transform:uppercase;line-height:1;}
.logo span{color:var(--gold);}
.header-meta{text-align:right;}
.header-date{font-size:11px;font-weight:600;color:var(--gold);letter-spacing:0.05em;}
.header-sub{font-size:10px;color:var(--mid);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}

.sub-header{background:var(--parchment);border-bottom:1px solid var(--border);padding:12px 20px;}
.sub-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.doc-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;letter-spacing:0.04em;}
.doc-sub{font-size:11px;color:var(--mid);margin-top:1px;}
.btn-print{background:var(--ink);color:var(--gold);border:none;border-radius:6px;padding:8px 16px;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.04em;cursor:pointer;white-space:nowrap;}
.btn-print:hover{background:#2a2420;}
.btn-reset{background:none;border:1px solid var(--border);color:var(--mid);border-radius:6px;padding:8px 14px;font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;white-space:nowrap;}

.progress-bar-wrap{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;}
.progress-inner{max-width:860px;margin:0 auto;}
.progress-stats{display:flex;gap:20px;margin-bottom:10px;flex-wrap:wrap;}
.p-stat{display:flex;flex-direction:column;gap:1px;}
.p-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid);}
.p-val{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;line-height:1;color:var(--ink);}
.p-val.green{color:var(--green);}
.p-val.gold{color:var(--gold);}
.progress-track{height:6px;background:var(--warm);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.4s ease;}

.filter-bar{background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-inner{max-width:860px;margin:0 auto;display:flex;padding:0 20px;gap:0;}
.f-btn{flex-shrink:0;background:none;border:none;border-bottom:3px solid transparent;padding:11px 14px 9px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.03em;color:var(--mid);cursor:pointer;white-space:nowrap;}
.f-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

main{max-width:860px;margin:0 auto;padding:20px;}

.section-wrap{margin-bottom:24px;}
.section-wrap[data-hidden="true"]{display:none;}
.section-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--ink);border-radius:var(--radius) var(--radius) 0 0;cursor:pointer;user-select:none;}
.section-hd-icon{width:28px;height:28px;border-radius:50%;background:rgba(184,148,74,0.15);border:1px solid rgba(184,148,74,0.3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.section-hd-text{flex:1;}
.section-hd-label{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;color:var(--bone);letter-spacing:0.04em;}
.section-hd-sub{font-size:10px;color:var(--mid);letter-spacing:0.08em;text-transform:uppercase;margin-top:1px;}
.section-hd-prog{font-size:11px;font-weight:600;color:var(--gold-lt);white-space:nowrap;flex-shrink:0;}
.section-hd-chevron{font-size:12px;color:var(--mid);flex-shrink:0;transition:transform 0.2s;}
.section-hd.collapsed .section-hd-chevron{transform:rotate(-90deg);}

.items-wrap{background:var(--white);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;}

.check-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;}
.check-row:last-child{border-bottom:none;}
.check-row:hover{background:var(--bone);}
.check-row.done{background:rgba(42,92,63,0.04);}
.check-box{width:20px;height:20px;flex-shrink:0;border:2px solid var(--warm);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;margin-top:1px;transition:background 0.15s,border-color 0.15s;}
.check-row.done .check-box{background:var(--green);border-color:var(--green);}
.check-row.na .check-box{background:var(--warm);border-color:var(--warm);font-size:9px;}
.check-content{flex:1;min-width:0;}
.check-text{font-size:13px;line-height:1.45;color:var(--ink);}
.check-row.done .check-text{text-decoration:line-through;color:var(--mid);}
.check-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;align-items:center;}
.cbc-link{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;letter-spacing:0.06em;color:var(--blue);text-decoration:none;background:#dce8f8;border-radius:3px;padding:2px 7px;white-space:nowrap;}
.cbc-link:hover{background:#ccdaf5;text-decoration:none;}
.cbc-link::before{content:"§";font-size:9px;opacity:0.7;}
.tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;border-radius:3px;padding:2px 7px;white-space:nowrap;}
.tag-critical{background:#fce8e4;color:#6b2a1e;}
.tag-note{background:var(--parchment);color:var(--mid);}
.tag-trade{background:#f0f7f0;color:var(--green);}
.check-note{font-size:11px;color:var(--mid);margin-top:4px;line-height:1.4;font-style:italic;}

.na-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bone);}
.na-row:last-child{border-bottom:none;}
.na-lbl{font-size:11px;color:var(--mid);font-style:italic;}

.empty-section{padding:20px;text-align:center;color:var(--warm);font-size:13px;font-style:italic;}

.sign-off-table{width:100%;border-collapse:collapse;}
.sign-off-table th{background:var(--parchment);text-align:left;padding:10px 14px;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid);border-bottom:1px solid var(--border);}
.sign-off-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top;}
.sign-off-table tr:last-child td{border-bottom:none;}
.sign-line{border-bottom:1px solid var(--warm);width:100%;height:28px;display:block;}
.sig-label{font-size:10px;color:var(--mid);margin-top:3px;}

/* N/A toggle */
.na-toggle{margin-left:auto;flex-shrink:0;background:none;border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:10px;color:var(--mid);cursor:pointer;font-family:'Inter',sans-serif;}
.na-toggle:hover{border-color:var(--warm);}
.check-row.na .check-text{color:var(--warm);font-style:italic;}

@media print {
  header,#filter-bar,.btn-print,.btn-reset,.na-toggle{display:none!important;}
  .section-hd{cursor:default;background:var(--parchment)!important;}
  .section-hd-label{color:var(--ink)!important;}
  .section-hd-sub,.section-hd-prog{color:var(--mid)!important;}
  .section-hd-chevron{display:none;}
  .items-wrap[style*="display:none"]{display:block!important;}
  body{background:white;font-size:12px;}
  .check-row:hover{background:none;}
  .progress-bar-wrap{border:1px solid var(--border);}
  main{padding:0;}
  .section-wrap{break-inside:avoid-page;margin-bottom:16px;}
  .check-row{break-inside:avoid;}
  .sub-header{padding:8px 0;}
  .progress-stats{margin-bottom:6px;}
}

@media(max-width:600px){
  header{padding:14px 16px 12px;}
  .sub-inner,.progress-stats{gap:8px;}
  main{padding:14px 12px;}
  .check-row{padding:11px 12px;}
  .section-hd{padding:10px 12px;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="logo">Canon <span>Vaults</span></div>
      <div style="font-size:10px;color:var(--mid);letter-spacing:0.1em;text-transform:uppercase;margin-top:3px;">Final Inspection Checklist</div>
    </div>
    <div class="header-meta">
      <div class="header-date" id="live-date"></div>
      <div class="header-sub">T. Grayling · COO</div>
    </div>
  </div>
</header>

<div class="sub-header">
  <div class="sub-inner">
    <div>
      <div class="doc-title">Certificate of Occupancy — Pre-Inspection</div>
      <div class="doc-sub">California Building Code 2022 · CBC Title 24, Part 2</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-reset" onclick="resetAll()">Reset All</button>
      <button class="btn-print" onclick="window.print()">Print / PDF</button>
    </div>
  </div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-inner">
    <div class="progress-stats">
      <div class="p-stat"><div class="p-label">Total Items</div><div class="p-val" id="stat-total">0</div></div>
      <div class="p-stat"><div class="p-label">Complete</div><div class="p-val green" id="stat-done">0</div></div>
      <div class="p-stat"><div class="p-label">Remaining</div><div class="p-val gold" id="stat-rem">0</div></div>
      <div class="p-stat"><div class="p-label">N/A</div><div class="p-val" id="stat-na" style="color:var(--mid)">0</div></div>
      <div class="p-stat" style="margin-left:auto;text-align:right;"><div class="p-label">Progress</div><div class="p-val green" id="stat-pct">0%</div></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
</div>

<div class="filter-bar" id="filter-bar">
  <div class="filter-inner">
    <button class="f-btn active" onclick="setFilter('all',this)">All</button>
    <button class="f-btn" onclick="setFilter('admin',this)">Admin</button>
    <button class="f-btn" onclick="setFilter('fire',this)">Fire &amp; Life Safety</button>
    <button class="f-btn" onclick="setFilter('egress',this)">Egress</button>
    <button class="f-btn" onclick="setFilter('access',this)">Accessibility</button>
    <button class="f-btn" onclick="setFilter('structural',this)">Structural</button>
    <button class="f-btn" onclick="setFilter('mech',this)">Mechanical</button>
    <button class="f-btn" onclick="setFilter('electrical',this)">Electrical</button>
    <button class="f-btn" onclick="setFilter('vault',this)">Vault &amp; Security</button>
    <button class="f-btn" onclick="setFilter('special',this)">Special Occ.</button>
    <button class="f-btn" onclick="setFilter('signoff',this)">Sign-offs</button>
  </div>
</div>

<main id="main-content"></main>

// ─── STATE ─────────────────────────────────────────────────────────────────────
const STORE_KEY = 'cv_checklist_v1';
let state = {};
let activeFilter = 'all';

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); } catch(e) { state={}; }
}
function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

// ─── RENDER ────────────────────────────────────────────────────────────────────
function getItemState(id) { return state[id] || 'none'; } // 'none' | 'done' | 'na'

function render() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  SECTIONS.forEach(sec => {
    const visible = activeFilter === 'all' || sec.cat === activeFilter;
    const wrap = document.createElement('div');
    wrap.className = 'section-wrap';
    wrap.dataset.hidden = visible ? 'false' : 'true';

    const doneCount = sec.items.filter(i => getItemState(i.id) === 'done').length;
    const naCount   = sec.items.filter(i => getItemState(i.id) === 'na').length;
    const total     = sec.items.length;
    const active    = total - naCount;
    const pct       = active > 0 ? Math.round((doneCount / active) * 100) : 100;
    const collapsed = state['__sec_' + sec.id] === 'collapsed';

    wrap.innerHTML = `
      <div class="section-hd ${collapsed?'collapsed':''}" onclick="toggleSection('${sec.id}')">
        <div class="section-hd-icon">${sec.icon}</div>
        <div class="section-hd-text">
          <div class="section-hd-label">${sec.label}</div>
          <div class="section-hd-sub">${sec.sub}</div>
        </div>
        <div class="section-hd-prog">${doneCount}/${active} · ${pct}%</div>
        <div class="section-hd-chevron">▾</div>
      </div>
      <div class="items-wrap" id="items-${sec.id}" style="${collapsed?'display:none':''}">
        ${sec.items.map(item => renderItem(item)).join('')}
      </div>`;
    main.appendChild(wrap);
  });
  updateStats();
}

function renderItem(item) {
  const s = getItemState(item.id);
  const cbcLinks = (item.cbc||[]).map(c =>
    `<a class="cbc-link" href="${c.href}" target="_blank" rel="noopener noreferrer">${c.label}</a>`
  ).join('');
  const criticalTag = item.critical ? '<span class="tag tag-critical">Critical</span>' : '';
  const checkMark = s === 'done' ? '✓' : s === 'na' ? 'N/A' : '';
  return `
    <div class="check-row ${s}" id="row-${item.id}" onclick="cycleItem('${item.id}')">
      <div class="check-box">${checkMark}</div>
      <div class="check-content">
        <div class="check-text">${item.text}</div>
        <div class="check-meta">
          ${cbcLinks}
          ${criticalTag}
          ${item.note?`<span class="tag tag-note">${item.note}</span>`:''}
        </div>
      </div>
      <button class="na-toggle" onclick="setNA(event,'${item.id}')" title="Mark N/A">${s==='na'?'Undo N/A':'N/A'}</button>
    </div>`;
}

function cycleItem(id) {
  const s = getItemState(id);
  state[id] = s === 'none' ? 'done' : s === 'done' ? 'none' : 'none';
  saveState();
  refreshItem(id);
  updateStats();
}

function setNA(e, id) {
  e.stopPropagation();
  const s = getItemState(id);
  state[id] = s === 'na' ? 'none' : 'na';
  saveState();
  refreshItem(id);
  updateStats();
}

function refreshItem(id) {
  const row = document.getElementById('row-' + id);
  if (!row) return;
  const sec = SECTIONS.find(s => s.items.some(i => i.id === id));
  const item = (sec||{items:[]}).items.find(i => i.id === id);
  if (!sec || !item) return;
  row.outerHTML = renderItem(item);
  // update section header progress
  const secWrap = document.querySelector(`#items-${sec.id}`);
  if (secWrap) {
    const hd = secWrap.previousElementSibling;
    const doneCount = sec.items.filter(i => getItemState(i.id) === 'done').length;
    const naCount   = sec.items.filter(i => getItemState(i.id) === 'na').length;
    const active    = sec.items.length - naCount;
    const pct       = active > 0 ? Math.round((doneCount / active) * 100) : 100;
    hd.querySelector('.section-hd-prog').textContent = `${doneCount}/${active} · ${pct}%`;
  }
}

function toggleSection(id) {
  const el = document.getElementById('items-' + id);
  const hd = el.previousElementSibling;
  const collapsed = el.style.display === 'none';
  el.style.display = collapsed ? '' : 'none';
  hd.classList.toggle('collapsed', !collapsed);
  state['__sec_' + id] = collapsed ? '' : 'collapsed';
  saveState();
}

function updateStats() {
  let total = 0, done = 0, na = 0;
  SECTIONS.forEach(s => {
    s.items.forEach(i => {
      total++;
      const st = getItemState(i.id);
      if (st === 'done') done++;
      if (st === 'na') na++;
    });
  });
  const active = total - na;
  const pct = active > 0 ? Math.round((done / active) * 100) : 100;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent  = done;
  document.getElementById('stat-rem').textContent   = active - done;
  document.getElementById('stat-na').textContent    = na;
  document.getElementById('stat-pct').textContent   = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ─── FILTER ────────────────────────────────────────────────────────────────────
function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section-wrap').forEach(wrap => {
    const sec = SECTIONS.find(s => 'items-' + s.id === wrap.querySelector('[id^="items-"]')?.id);
    if (!sec) return;
    wrap.dataset.hidden = (cat === 'all' || sec.cat === cat) ? 'false' : 'true';
  });
}

// ─── RESET ─────────────────────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('Reset all checklist items? This cannot be undone.')) return;
  localStorage.removeItem(STORE_KEY);
  state = {};
  render();
}

// ─── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('live-date').textContent =
  new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
loadState();
render();
</script>
